# MarketSpot 개발용 한방 구성 (개인 로컬 전용 — dev only, prod 분리 없음).
#   docker compose up        # 백엔드(8000) + 프론트(5173) 동시 기동
#   docker compose up --build # 의존성/Dockerfile 바뀌었을 때
# 코드는 볼륨 마운트라 편집 즉시 반영(백엔드 uvicorn --reload, 프론트 Vite HMR).
# Ollama 는 호스트(11434)의 기존 인스턴스를 재사용한다(모델 재다운로드 X).
name: marketspot

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # 라이브 코드 + ./backend/data 의 settings.json 영속
    environment:
      # 호스트 Ollama 재사용 (qwen3-vl:8b 이미 받아둔 것).
      OLLAMA_HOST: http://host.docker.internal:11434
      # SEC 공시 호출용 연락처 포함 User-Agent (예의상 권장).
      SEC_USER_AGENT: "MarketSpot/0.1 (local dev; sanchez.kim.kr@gmail.com)"
      STOCK_TERMINAL_DATA_DIR: /app/data
      # macOS 볼륨 마운트에서 파일변경 감지를 확실히 하려고 폴링 강제.
      WATCHFILES_FORCE_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway" # 리눅스 호스트에서도 동작하도록

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app # 라이브 소스
      - /app/node_modules # 컨테이너 node_modules 보존(호스트가 덮어쓰지 않게)
    environment:
      # Vite /api 프록시 타겟을 backend 서비스로.
      VITE_API_TARGET: http://backend:8000
      # 볼륨 마운트 HMR 안정화(폴링).
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
